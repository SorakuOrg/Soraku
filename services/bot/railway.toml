[build]
builder = "DOCKERFILE"
dockerfilePath = "services/bot/Dockerfile"

[deploy]
startCommand = "node dist/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
healthcheckPath = "/health"
healthcheckTimeout = 10

[[services]]
name = "soraku-bot"

[services.variables]
NODE_ENV = "production"
